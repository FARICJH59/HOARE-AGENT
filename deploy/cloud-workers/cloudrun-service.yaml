apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hoare-agent-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "25"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: gcr.io/PROJECT_ID/hoare-agent-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: HOARE_HTTP_PORT
              value: "8080"
            - name: HOARE_GRPC_PORT
              value: "50051"
            - name: HOARE_REQUIRE_AUTH
              value: "1"
            - name: HOARE_USE_MOCK_LLM
              value: "0"
          resources:
            limits:
              cpu: "2"
              memory: 2Gi

